<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Portal</title>
    
    <!-- Scripts required for X-Frame-Bypass -->
    <script src="https://unpkg.com/@ungap/custom-elements-builtin"></script>
    <script type="module" src="https://unpkg.com/x-frame-bypass"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: white;
            overflow: hidden;
        }

        /* Tab Navigation */
        .tab-bar {
            display: flex;
            background: #1f1f1f;
            padding: 10px 10px 0 10px;
            gap: 5px;
            border-bottom: 2px solid #333;
        }

        .tab {
            padding: 10px 20px;
            cursor: pointer;
            background: #2a2a2a;
            border-radius: 8px 8px 0 0;
            border: none;
            color: #aaa;
            transition: 0.3s;
            font-weight: 600;
        }

        .tab.active {
            background: #3d3d3d;
            color: #fff;
            border-bottom: 2px solid #007bff;
        }

        .tab:hover:not(.active) {
            background: #333;
        }

        /* Content Area */
        .content-container {
            height: calc(100vh - 52px);
            width: 100%;
        }

        .iframe-wrapper {
            display: none;
            width: 100%;
            height: 100%;
        }

        .iframe-wrapper.active {
            display: block;
        }

        /* Essential for the bypass to function correctly */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        .status-bar {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 12px;
            color: #555;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="tab-bar">
        <button class="tab active" onclick="openTab(event, 'stream')">Watch</button>
        <button class="tab" onclick="openTab(event, 'games')">Games</button>
    </div>

    <div class="content-container">
        <!-- Watch Tab -->
        <div id="stream" class="iframe-wrapper active">
            <!-- added is="x-frame-bypass" to handle the connection error -->
            <!-- sandbox attribute acts as the ad-blocker -->
            <iframe 
                is="x-frame-bypass"
                src="https://aniwaves.ru/watch/bleach-80678/ep-1" 
                sandbox="allow-forms allow-scripts allow-same-origin allow-presentation"
                allowfullscreen>
            </iframe>
        </div>

        <!-- Games Tab -->
        <div id="games" class="iframe-wrapper">
            <iframe src="https://hideout-now.lovable.app/games" allowfullscreen></iframe>
        </div>
    </div>

    <div class="status-bar">X-Frame Bypass + Ad-Block Active</div>

    <script>
        function openTab(evt, tabId) {
            const contents = document.getElementsByClassName("iframe-wrapper");
            for (let i = 0; i < contents.length; i++) {
                contents[i].classList.remove("active");
            }

            const tabs = document.getElementsByClassName("tab");
            for (let i = 0; i < tabs.length; i++) {
                tabs[i].classList.remove("active");
            }

            document.getElementById(tabId).classList.add("active");
            evt.currentTarget.classList.add("active");
        }
    </script>
</body>
</html>
